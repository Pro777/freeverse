<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!--
    Freeverse Favicon: Serif Lowercase "f"
    Typographic mark embodying literary restraint and typographic authority.
    Color: #8a6a12 (muted gold—the warmth of library shelves and aged paper)
    Every element deliberated with master-level precision.
    Designed for crisp legibility at 16×16 and graceful presence at larger scales.
  -->

  <!-- Vertical stem: the spine -->
  <rect x="11" y="3" width="2.5" height="23" fill="#8a6a12"/>

  <!-- Bottom serif: anchor to baseline -->
  <rect x="9.5" y="25.5" width="7" height="1.2" fill="#8a6a12"/>

  <!-- Cross-bar: the horizontal element -->
  <rect x="11" y="10.5" width="8.5" height="2" fill="#8a6a12"/>

  <!-- Top serif accent: subtle mark at ascender peak -->
  <rect x="10" y="2.2" width="4.5" height="0.7" fill="#8a6a12"/>
</svg>
